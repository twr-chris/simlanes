- name: "Tier 1"
  level: 1
  price_range: "$200 – $400"
  color: "#4a8c5c"
  description: "A desk-mount kit to find out if sim racing is for you"
  flavors:
    - name: "Logitech"
      components:
        wheelbase:
          name: "Logitech G29 / G920"
          price: "$230"
          notes: "Gear-driven FFB. Comes bundled with rim, pedals, and desk clamp."
          bundles: ["wheel_rim", "pedals", "mount"]
          provides: ["force_feedback", "paddle_shifters", "clutch_pedal", "high_rotation"]
    - name: "Moza"
      components:
        wheelbase:
          name: "Moza R3 Bundle"
          price: "$279"
          notes: "Entry-level direct drive FFB. Comes bundled with rim, pedals, and desk clamp."
          bundles: ["wheel_rim", "pedals", "mount"]
          provides: ["force_feedback", "paddle_shifters", "high_rotation"]

- name: "Tier 2"
  level: 2
  price_range: "$600 – $900"
  color: "#3d8b8b"
  description: "Better FFB and flexible shifters"
  flavors:
    - name: "Thrustmaster"
      components:
        wheelbase:
          name: "Thrustmaster T300 RS GT"
          price: "$400"
          notes: "Belt-driven FFB. Big step up in fidelity from gear-driven. Includes detachable 28 cm rim."
          bundles: ["wheel_rim", "pedals"]
          provides: ["force_feedback", "paddle_shifters", "clutch_pedal", "high_rotation"]
        cockpit:
          name: "Next Level Racing Wheel Stand 2.0"
          price: "$279"
          notes: "Foldable stand. Much stiffer than a desk clamp, stores away when not in use."
          bundles: ["mount"]
          provides: ["rigid_mount"]
        shifter:
          name: "Thrustmaster TH8A"
          price: "$199"
          notes: "H-pattern and sequential modes. Solid metal construction."
          optional: true
          provides: ["h_pattern_shifter", "sequential_shifter"]
    - name: "Moza"
      components:
        wheelbase:
          name: "Moza R5 Bundle"
          price: "$400"
          notes: "Belt-driven FFB. Big step up in fidelity from gear-driven. Includes detachable 28 cm rim."
          bundles: ["wheel_rim", "pedals"]
          provides: ["force_feedback", "paddle_shifters", "clutch_pedal", "high_rotation"]
        cockpit:
          name: "Next Level Racing Wheel Stand 2.0"
          price: "$279"
          notes: "Foldable stand. Much stiffer than a desk clamp, stores away when not in use."
          bundles: ["mount"]
          provides: ["rigid_mount"]
        shifter:
          name: "SHH Shifter HUBB"
          price: "$150"
          notes: "H-pattern and sequential modes. Solid metal construction."
          optional: true
          provides: ["h_pattern_shifter", "sequential_shifter"]

- name: "Tier 3"
  level: 3
  price_range: "$1,500 – $2,500"
  color: "#3b6fa0"
  description: "A dedicated cockpit with direct-drive force feedback"
  flavors:
    - name: "Moza Ecosystem"
      components:
        wheelbase:
          name: "Moza R5"
          price: "$300"
          notes: "Entry direct-drive. 5.5 Nm — less torque than flagships but vastly smoother than belt/gear."
          provides: ["force_feedback", "paddle_shifters", "high_rotation"]
        wheel_rim:
          name: "Moza ES Wheel"
          price: "$130"
          notes: "Round 27 cm rim. Good all-rounder for GT and formula."
          provides: ["paddle_shifters"]
        pedals:
          name: "Moza CRP"
          price: "$200"
          notes: "Load-cell pedals with adjustable brake stiffness. 200 kg max force."
          provides: ["load_cell_brake", "clutch_pedal"]
        shifter:
          name: "Moza HGP"
          price: "$130"
          notes: "H-pattern with short throw. Magnetic gear engagement."
          provides: ["h_pattern_shifter"]
        cockpit:
          name: "Next Level Racing GT Track"
          price: "$500"
          notes: "Full aluminum cockpit. Adjustable pedal plate angle, seat slider."
          bundles: ["mount"]
          provides: ["rigid_mount"]
        seat:
          name: "Next Level Racing ES1 Seat"
          price: "$300"
          notes: "Faux leather bucket seat with side bolsters. Mounts directly to GT Track."
    - name: "Fanatec Ecosystem"
      components:
        wheelbase:
          name: "Fanatec CSL DD (8 Nm)"
          price: "$350"
          notes: "Direct drive with Fanatec's huge rim ecosystem. 8 Nm with boost kit."
          provides: ["force_feedback", "high_rotation"]
        wheel_rim:
          name: "Fanatec CSL Elite Steering Wheel"
          price: "$200"
          notes: "Multi-purpose rim with metal paddle shifters and funky switch."
          provides: ["paddle_shifters"]
        pedals:
          name: "Fanatec CSL Pedals LC"
          price: "$200"
          notes: "Load-cell brake. Solid entry into Fanatec's pedal range."
          provides: ["load_cell_brake", "clutch_pedal"]
        shifter:
          name: "Fanatec ClubSport Shifter SQ V1.5"
          price: "$260"
          notes: "H-pattern and sequential. Connects through wheelbase — one less USB cable."
          provides: ["h_pattern_shifter", "sequential_shifter"]
        cockpit:
          name: "GT Omega PRIME"
          price: "$450"
          notes: "Profile aluminum cockpit. Good value for a rigid frame."
          bundles: ["mount"]
          provides: ["rigid_mount"]
        seat:
          name: "GT Omega RS9 Seat"
          price: "$250"
          notes: "Fabric bucket seat. Breathable for long sessions."

- name: "Tier 4"
  level: 4
  price_range: "$3,000 – $5,000"
  color: "#5b4fa0"
  description: "High-end direct drive, triples or VR, and rally gear"
  components:
    wheelbase:
      name: "Simagic Alpha Mini"
      price: "$500"
      notes: "10 Nm direct drive. Excellent detail and responsiveness."
      provides: ["force_feedback", "high_torque_ffb", "high_rotation"]
    wheel_rim:
      name: "Simagic GTC"
      price: "$280"
      notes: "GT-style with button cluster, dual clutch paddles, and 7-way funky switch."
      provides: ["paddle_shifters", "button_plate"]
    pedals:
      name: "Heusinkveld Sprint"
      price: "$600"
      notes: "High-end load cell. 65 kg max brake force with adjustable elastomers."
      provides: ["load_cell_brake", "clutch_pedal"]
    shifter:
      name: "Heusinkveld Sim Shifter Sequential"
      price: "$300"
      notes: "Industrial feel. Adjustable detent force."
      provides: ["sequential_shifter"]
    cockpit:
      name: "SimLab GT1 Evo"
      price: "$500"
      notes: "8020 aluminum extrusion. Practically infinite adjustability."
      provides: ["rigid_mount"]
    seat:
      name: "Sparco Grid Q"
      price: "$350"
      notes: "FIA-rated fiberglass racing seat. The real thing."
    handbrake:
      name: "Heusinkveld Sim Handbrake"
      price: "$250"
      notes: "Hydraulic feel with adjustable travel. Essential for rally and drift."
      provides: ["handbrake"]


- name: "Tier 5"
  level: 5
  price_range: "$10,000+"
  color: "#d03a5c"
  description: "Becasue we could"
  components:
    wheelbase:
      name: "Simucube 2 Pro"
      price: "$1,500"
      notes: "25 Nm. Built like tank."
      provides: ["force_feedback", "high_torque_ffb", "high_rotation"]
    wheel_rim:
      name: "Simucube Valo GT-23 Leather"
      price: "$1,000"
      notes: "Round, well-equipped, easy to clean. Wireless with Simucube."
      provides: ["paddle_shifters"]
    pedals:
      name: "Heusinkveld Ultimate 3-pedal"
      price: "$1,200"
      notes: "Adjustable, indestructable."
      provides: ["load_cell_brake", "clutch_pedal"]
    shifter:
      name: "BDH H1SQ"
      price: "$1,200"
      notes: "4kg of aluminum and steel."
      provides: ["h_pattern_shifter", "sequential_shifter"]
    cockpit:
      name: "NLR F-GT Elite 160"
      price: "$1,200"
      notes: "Front plate edition for Simucube. Motion ready."
      bundles: ["mount"]
      provides: ["rigid_mount"]
    seat:
      name: "Sparco GT"
      price: "$500"
      notes: "Authentic 80s supercar feel, durable recline."
    handbrake:
      name: "Heusinkveld Sim Handbrake"
      price: "$250"
      notes: "Still the benchmark."
      provides: ["handbrake"]
    motion:
      name: "D-BOX 4250i 1.5"
      price: "$8,000"
      notes: "3DOF, indestructable, spec'd for commerical use."
      provides: ["motion_platform"]
